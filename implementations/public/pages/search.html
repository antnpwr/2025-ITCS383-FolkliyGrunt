<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Courts - Badminton Court Management</title>
  <meta name="description" content="Find badminton courts near you. Search by name, location, or price.">
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    .search-hero {
      background: linear-gradient(135deg, var(--primary), #7C3AED);
      color: white;
      padding: 3rem 0;
      margin-bottom: 2rem;
    }
    .search-hero h1 { color: white; font-size: 2rem; margin-bottom: 0.5rem; }
    .search-hero p { opacity: 0.85; }

    .search-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid var(--border);
    }
    .tab-btn {
      padding: 0.6rem 1.2rem;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .search-bar-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }
    .search-bar-row .form-group { flex: 1; margin-bottom: 0; }
    .search-bar-row .btn { white-space: nowrap; padding: 0.75rem 1.5rem; }

    .courts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }
    .court-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .court-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }
    .court-card-header {
      background: linear-gradient(135deg, var(--primary), #7C3AED);
      padding: 1.25rem 1.5rem;
      color: white;
    }
    .court-card-header h3 { color: white; margin: 0 0 0.25rem; font-size: 1.1rem; }
    .court-card-header .status-badge {
      display: inline-block;
      padding: 0.15rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(255,255,255,0.25);
      color: white;
    }
    .court-card-body { padding: 1.25rem 1.5rem; }
    .court-meta {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }
    .court-meta span { display: flex; align-items: center; gap: 0.4rem; }
    .price-tag {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
    }
    .rating-stars { color: #F59E0B; font-size: 1rem; }

    .loading { text-align: center; padding: 2rem; color: var(--text-muted); }
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
      background: var(--surface);
      border-radius: 0.75rem;
      border: 1px dashed var(--border);
    }
    .empty-state h3 { margin-bottom: 0.5rem; }

    #error-msg {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      color: var(--error);
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
      display: none;
    }

    .gps-btn {
      display: flex; align-items: center; gap: 0.4rem;
      background: var(--secondary);
      color: white;
      border: none;
      padding: 0.6rem 1rem;
      border-radius: 0.375rem;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .gps-btn:hover { opacity: 0.85; }
    #gps-status { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3rem; }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <h2><a href="/" style="color: var(--text-main); text-decoration: none;">🏸 Badminton Center</a></h2>
      <div class="nav-links">
        <a href="search.html">Find Courts</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <div class="search-hero">
    <div class="container">
      <h1>Find Your Court</h1>
      <p>Search by name, distance from your location, or budget</p>
    </div>
  </div>

  <main class="container">

    <!-- Error message -->
    <div id="error-msg"></div>

    <!-- Search Tabs -->
    <div class="card" style="margin-bottom: 2rem;">
      <div class="search-tabs">
        <button class="tab-btn active" id="tab-name-btn" onclick="switchTab('name')">🔍 By Name</button>
        <button class="tab-btn" id="tab-distance-btn" onclick="switchTab('distance')">📍 By Distance</button>
        <button class="tab-btn" id="tab-price-btn" onclick="switchTab('price')">💰 By Price</button>
      </div>

      <!-- Tab: Name -->
      <div class="tab-panel active" id="tab-name">
        <div class="search-bar-row">
          <div class="form-group">
            <label for="search-name">Court Name</label>
            <input type="text" id="search-name" placeholder="e.g. Bangkok Court, Mahidol..." />
          </div>
          <button class="btn btn-primary" id="btn-search-name" onclick="searchByName()">Search</button>
        </div>
      </div>

      <!-- Tab: Distance -->
      <div class="tab-panel" id="tab-distance">
        <div style="margin-bottom: 1rem;">
          <button class="gps-btn" id="btn-gps" onclick="getMyLocation()">
            📡 Use My Current Location
          </button>
          <div id="gps-status">Click to detect your GPS coordinates</div>
        </div>
        <div class="search-bar-row">
          <div class="form-group">
            <label for="search-lat">Latitude</label>
            <input type="number" id="search-lat" placeholder="e.g. 13.7948" step="any" />
          </div>
          <div class="form-group">
            <label for="search-lng">Longitude</label>
            <input type="number" id="search-lng" placeholder="e.g. 100.3267" step="any" />
          </div>
          <div class="form-group" style="max-width: 160px;">
            <label for="search-radius">Radius (km)</label>
            <input type="number" id="search-radius" placeholder="10" value="10" min="1" max="100" />
          </div>
          <button class="btn btn-primary" onclick="searchByDistance()">Search</button>
        </div>
      </div>

      <!-- Tab: Price -->
      <div class="tab-panel" id="tab-price">
        <div class="search-bar-row">
          <div class="form-group">
            <label for="search-price">Max Price per Hour (฿)</label>
            <input type="number" id="search-price" placeholder="e.g. 200" min="0" />
          </div>
          <button class="btn btn-primary" onclick="searchByPrice()">Search</button>
        </div>
      </div>
    </div>

    <!-- All courts button -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
      <h2 id="results-title">All Available Courts</h2>
      <button class="btn btn-outline" onclick="loadAllCourts()" style="font-size:0.9rem;">Show All Courts</button>
    </div>

    <!-- Results -->
    <div id="courts-container">
      <div class="loading">Loading courts...</div>
    </div>

  </main>

  <script>
    const API_BASE = '/api/courts';

    // ─── Tab switching ───────────────────────────────────────────────────
    function switchTab(tab) {
      ['name', 'distance', 'price'].forEach(t => {
        document.getElementById(`tab-${t}`).classList.remove('active');
        document.getElementById(`tab-${t}-btn`).classList.remove('active');
      });
      document.getElementById(`tab-${tab}`).classList.add('active');
      document.getElementById(`tab-${tab}-btn`).classList.add('active');
    }

    // ─── GPS ─────────────────────────────────────────────────────────────
    function getMyLocation() {
      const statusEl = document.getElementById('gps-status');
      const btn = document.getElementById('btn-gps');
      if (!navigator.geolocation) {
        statusEl.textContent = '❌ Geolocation is not supported by your browser.';
        return;
      }
      btn.textContent = '⏳ Detecting...';
      btn.disabled = true;
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          document.getElementById('search-lat').value = pos.coords.latitude.toFixed(6);
          document.getElementById('search-lng').value = pos.coords.longitude.toFixed(6);
          statusEl.textContent = `✅ Location detected: ${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
          btn.textContent = '📡 Use My Current Location';
          btn.disabled = false;
        },
        (err) => {
          statusEl.textContent = '❌ Could not get location: ' + err.message;
          btn.textContent = '📡 Use My Current Location';
          btn.disabled = false;
        }
      );
    }

    // ─── Search functions ─────────────────────────────────────────────────
    async function searchByName() {
      const name = document.getElementById('search-name').value.trim();
      if (!name) { showError('Please enter a court name to search.'); return; }
      clearError();
      setResultsTitle(`Search results for "${name}"`);
      await fetchCourts(`${API_BASE}/search?name=${encodeURIComponent(name)}`);
    }

    async function searchByDistance() {
      const lat = document.getElementById('search-lat').value;
      const lng = document.getElementById('search-lng').value;
      const radius = document.getElementById('search-radius').value || 10;
      if (!lat || !lng) { showError('Please enter latitude and longitude (or use GPS detection).'); return; }
      clearError();
      setResultsTitle(`Courts within ${radius} km of your location`);
      await fetchCourts(`${API_BASE}/search?lat=${lat}&lng=${lng}&radius=${radius}`);
    }

    async function searchByPrice() {
      const maxPrice = document.getElementById('search-price').value;
      if (!maxPrice || maxPrice <= 0) { showError('Please enter a valid max price.'); return; }
      clearError();
      setResultsTitle(`Courts up to ฿${maxPrice}/hour`);
      await fetchCourts(`${API_BASE}/search?maxPrice=${maxPrice}`);
    }

    async function loadAllCourts() {
      clearError();
      setResultsTitle('All Available Courts');
      await fetchCourts(API_BASE);
    }

    // ─── Core fetch & render ─────────────────────────────────────────────
    async function fetchCourts(url) {
      const container = document.getElementById('courts-container');
      container.innerHTML = '<div class="loading">⏳ Loading courts...</div>';
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const courts = await res.json();
        renderCourts(courts);
      } catch (err) {
        container.innerHTML = '';
        showError('Failed to load courts: ' + err.message);
      }
    }

    function renderCourts(courts) {
      const container = document.getElementById('courts-container');
      if (!courts || courts.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h3>No courts found</h3>
            <p>Try a different search or <button class="btn btn-outline" style="font-size:0.85rem; padding:0.4rem 0.8rem;" onclick="loadAllCourts()">view all courts</button></p>
          </div>`;
        return;
      }

      container.innerHTML = `<div class="courts-grid">${courts.map(courtCard).join('')}</div>`;
    }

    function courtCard(c) {
      const rating = parseFloat(c.avg_rating || 0).toFixed(1);
      const stars = '★'.repeat(Math.round(rating)) + '☆'.repeat(5 - Math.round(rating));
      const distanceInfo = c.distance_km != null
        ? `<span>📍 ${parseFloat(c.distance_km).toFixed(1)} km away</span>` : '';
      return `
        <div class="court-card" onclick="window.location.href='court-detail.html?id=${c.id}'">
          <div class="court-card-header">
            <h3>${escapeHtml(c.name)}</h3>
            <span class="status-badge">${c.current_status || 'AVAILABLE'}</span>
          </div>
          <div class="court-card-body">
            <div class="court-meta">
              <span>⏰ ${c.opening_time || '--'} – ${c.closing_time || '--'}</span>
              <span>👟 ${c.allowed_shoes || 'Any shoes'}</span>
              ${distanceInfo}
              <span class="rating-stars">${stars}</span> <small style="color:var(--text-muted);">(${rating}/5)</small>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <span class="price-tag">฿${parseFloat(c.price_per_hour).toFixed(0)}/hr</span>
              <button class="btn btn-primary" style="padding:0.4rem 1rem; font-size:0.85rem;"
                onclick="event.stopPropagation(); window.location.href='court-detail.html?id=${c.id}'">
                View Details
              </button>
            </div>
          </div>
        </div>`;
    }

    // ─── Helpers ─────────────────────────────────────────────────────────
    function setResultsTitle(title) {
      document.getElementById('results-title').textContent = title;
    }
    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }
    function clearError() {
      const el = document.getElementById('error-msg');
      el.style.display = 'none';
      el.textContent = '';
    }
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(text));
      return div.innerHTML;
    }

    // Allow enter-key search
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('search-name').addEventListener('keypress', e => { if (e.key === 'Enter') searchByName(); });
      document.getElementById('search-price').addEventListener('keypress', e => { if (e.key === 'Enter') searchByPrice(); });
      loadAllCourts();
    });
  </script>
</body>
</html>
