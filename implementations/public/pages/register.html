<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Badminton Court Management</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <h2>Badminton Center</h2>
      <div class="nav-links">
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
      </div>
    </div>
  </nav>

  <main class="container mt-4">
    <div class="card" style="max-width: 500px; margin: 2rem auto;">
      <h2 class="text-center mb-4">Create an Account</h2>
      <div id="register-error" class="mb-4" style="color: var(--error); display: none;"></div>
      <div id="register-success" class="mb-4" style="color: var(--secondary); display: none;"></div>
      
      <form id="registerForm">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required minlength="6">
        </div>

        <div class="form-group">
          <label for="address">Address</label>
          <textarea id="address" name="address" rows="3"></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
      </form>
      
      <p class="text-center mt-4">
        Already have an account? <a href="login.html">Login here</a>
      </p>
    </div>
  </main>

  <script src="../js/app.js"></script>
</body>
</html>
