<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - BadmintonPro</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
        theme: {
            extend: {
                fontFamily: { display: ["Lexend", "sans-serif"] },
                colors: {
                    primary: "#257bf4",
                    "background-light": "#f5f7f8"
                }
            }
        }
    }
  </script>
  <style> body { font-family: 'Lexend', sans-serif; bg-color: #f5f7f8; } </style>
</head>
<body class="bg-background-light text-slate-800 min-h-screen flex flex-col">
  <!-- Top Navigation Bar -->
  <header class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm">
      <div class="flex items-center gap-2 text-primary">
          <span class="material-symbols-outlined text-3xl font-bold">admin_panel_settings</span>
          <h2 class="text-xl font-bold tracking-tight text-slate-900">Admin Dashboard</h2>
      </div>
      <div class="flex items-center gap-4">
          <span class="text-sm font-medium text-slate-500">Logged in as Administrator</span>
          <button id="adminLogoutBtn" class="text-sm border border-red-500 text-red-500 hover:bg-red-50 px-4 py-2 rounded-lg transition-colors">
              Logout
          </button>
      </div>
  </header>

  <main class="flex-1 max-w-7xl w-full mx-auto p-6 md:p-10 flex gap-8 flex-col md:flex-row">
      
      <!-- Sidebar Tabs -->
      <aside class="w-full md:w-64 space-y-2 shrink-0">
          <button id="tab-courts" class="w-full text-left flex items-center gap-3 px-4 py-3 bg-primary text-white rounded-lg font-bold shadow-md transition-colors">
              <span class="material-symbols-outlined">sports_tennis</span> Manage Courts
          </button>
          <button id="tab-users" class="w-full text-left flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-100 rounded-lg font-bold transition-colors">
              <span class="material-symbols-outlined">group</span> Manage Users
          </button>
      </aside>

      <!-- Content Area -->
      <div class="flex-1 bg-white border border-slate-200 rounded-xl p-8 shadow-sm min-h-[500px]">
          
          <!-- COURTS PANEL -->
          <div id="panel-courts" class="block">
              <h3 class="text-2xl font-bold mb-6">Court Management</h3>

              <!-- Add New Court Form -->
              <div class="bg-slate-50 p-6 rounded-xl border border-slate-200 mb-8">
                  <h4 class="font-bold mb-4 flex items-center gap-2"><span class="material-symbols-outlined text-primary">add_circle</span> Register New Court</h4>
                  <form id="addCourtForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div>
                          <label class="block text-sm font-semibold mb-1">Court Name</label>
                          <input id="c-name" class="w-full rounded-lg border-slate-300 py-2 px-3 text-sm focus:ring-primary focus:border-primary" type="text" required />
                      </div>
                      <div>
                          <label class="block text-sm font-semibold mb-1">Price per Hour ($)</label>
                          <input id="c-price" class="w-full rounded-lg border-slate-300 py-2 px-3 text-sm focus:ring-primary focus:border-primary" type="number" step="0.01" required />
                      </div>
                      <div>
                          <label class="block text-sm font-semibold mb-1">Latitude</label>
                          <input id="c-lat" class="w-full rounded-lg border-slate-300 py-2 px-3 text-sm focus:ring-primary focus:border-primary" type="number" step="any" placeholder="13.7948" required />
                      </div>
                      <div>
                          <label class="block text-sm font-semibold mb-1">Longitude</label>
                          <input id="c-lng" class="w-full rounded-lg border-slate-300 py-2 px-3 text-sm focus:ring-primary focus:border-primary" type="number" step="any" placeholder="100.3267" required />
                      </div>
                      <div>
                          <label class="block text-sm font-semibold mb-1">Opening Time</label>
                          <input id="c-open" class="w-full rounded-lg border-slate-300 py-2 px-3 text-sm focus:ring-primary focus:border-primary" type="time" required />
                      </div>
                      <div>
                          <label class="block text-sm font-semibold mb-1">Closing Time</label>
                          <input id="c-close" class="w-full rounded-lg border-slate-300 py-2 px-3 text-sm focus:ring-primary focus:border-primary" type="time" required />
                      </div>
                      <div class="md:col-span-2">
                          <label class="block text-sm font-semibold mb-1">Allowed Shoes</label>
                          <input id="c-shoes" class="w-full rounded-lg border-slate-300 py-2 px-3 text-sm focus:ring-primary focus:border-primary" type="text" placeholder="e.g. Non-marking shoes only" />
                      </div>
                      <div class="md:col-span-2 mt-2">
                          <button type="submit" class="bg-primary hover:bg-primary/90 text-white font-bold py-2.5 px-6 rounded-lg w-full md:w-auto transition-colors">
                              Register Court
                          </button>
                      </div>
                  </form>
              </div>

              <!-- List Courts -->
              <h4 class="font-bold mb-4">Existing Courts</h4>
              <div class="overflow-x-auto">
                  <table class="w-full text-left text-sm whitespace-nowrap">
                      <thead class="bg-slate-100 text-slate-500 uppercase text-xs font-bold">
                          <tr>
                              <th class="px-4 py-3 rounded-tl-lg">Court Name</th>
                              <th class="px-4 py-3">Price/hr</th>
                              <th class="px-4 py-3">Hours</th>
                              <th class="px-4 py-3">Status</th>
                              <th class="px-4 py-3 rounded-tr-lg">Action</th>
                          </tr>
                      </thead>
                      <tbody id="admin-courts-tbody" class="divide-y divide-slate-100">
                          <tr><td colspan="5" class="py-4 text-center text-slate-400">Loading courts...</td></tr>
                      </tbody>
                  </table>
              </div>

          </div>

          <!-- USERS PANEL -->
          <div id="panel-users" class="hidden">
              <h3 class="text-2xl font-bold mb-6">User Management</h3>
              
              <div class="overflow-x-auto">
                  <table class="w-full text-left text-sm whitespace-nowrap">
                      <thead class="bg-slate-100 text-slate-500 uppercase text-xs font-bold">
                          <tr>
                              <th class="px-4 py-3 rounded-tl-lg">Name</th>
                              <th class="px-4 py-3">Role</th>
                              <th class="px-4 py-3">Joined Date</th>
                              <th class="px-4 py-3">Status</th>
                              <th class="px-4 py-3 rounded-tr-lg">Action</th>
                          </tr>
                      </thead>
                      <tbody id="admin-users-tbody" class="divide-y divide-slate-100">
                          <tr><td colspan="5" class="py-4 text-center text-slate-400">Loading users...</td></tr>
                      </tbody>
                  </table>
              </div>
          </div>

      </div>
  </main>

  <script src="/js/admin.js"></script>
</body>
</html>
