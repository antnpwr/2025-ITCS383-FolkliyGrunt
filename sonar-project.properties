# SonarCloud Configuration
# Organization: https://sonarcloud.io/organizations/antnpwr

sonar.projectKey=antnpwr_2025-ITCS383-FolkliyGrunt
sonar.organization=antnpwr

# Project metadata (displayed in SonarCloud UI)
sonar.projectName=Badminton Court Management System
sonar.projectVersion=2.0

# =============================================
# Source Code Configuration
# =============================================

# Source code directories (relative to project root)
sonar.sources=implementations/backend/config,implementations/backend/controllers,implementations/backend/middleware,implementations/backend/models,implementations/backend/routes,implementations/backend/services,implementations/backend/server.js

# Test coverage report from Jest (npm test -- --coverage)
sonar.javascript.lcov.reportPaths=implementations/backend/coverage/lcov.info

# =============================================
# File Filters
# =============================================

# Exclude from source analysis
# sonar.exclusions=**/node_modules/**,**/coverage/**,**/public/**/*.min.js
sonar.exclusions=/node_modules/,/coverage/,/public//*.min.js,**/supabase.js,**/db.js

# Test file patterns
sonar.tests=implementations/backend/tests
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# =============================================
# New Code Definition (Clean as You Code)
# =============================================
# Analyze only new code relative to the previous version
sonar.newCode.referenceBranch=master

# =============================================
# General Settings
# =============================================
sonar.sourceEncoding=UTF-8
