# SonarCloud Configuration
# Organization: https://sonarcloud.io/organizations/2025-itcs383-folkliygrunt

sonar.projectKey=2025-itcs383-folkliygrunt_badminton-court-management-system
sonar.organization=2025-itcs383-folkliygrunt

# Project metadata (displayed in SonarCloud UI)
sonar.projectName=Badminton Court Management System
sonar.projectVersion=1.0

# =============================================
# Source Code Configuration
# =============================================

# Source code directory (relative to project root)
sonar.sources=implementations/config,implementations/controllers,implementations/middleware,implementations/models,implementations/routes,implementations/server.js

# Test coverage report from Jest (npm test -- --coverage)
sonar.javascript.lcov.reportPaths=implementations/coverage/lcov.info

# =============================================
# File Filters
# =============================================

# Exclude from source analysis
sonar.exclusions=**/node_modules/**,**/coverage/**,**/public/**/*.min.js

# Test file patterns
sonar.tests=implementations/tests
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# =============================================
# General Settings
# =============================================
sonar.sourceEncoding=UTF-8
